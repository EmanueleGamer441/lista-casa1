name: Aggiorna Link M3U8

on:
  schedule:
    - cron: '0 * * * *' # Gira da solo in automatico ogni ora
  workflow_dispatch: # Permette l'avvio manuale cliccando sul sito

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Recupera file repo
      uses: actions/checkout@v3

    - name: Configura Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Installa pacchetti internet
      run: |
        pip install requests beautifulsoup4

    - name: Esegui aggiornamento
      run: python aggiorna.py

    - name: Salva modifiche su GitHub
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add lista_aggiornata.m3u
        git commit -m "Aggiornamento automatico link flussi" || exit 0
        git push
